# Lark Calendar CLI Configuration
# Copy this to .lark/config.yaml and fill in your values

# Lark/Feishu App credentials (from the Developer Console)
app_id: "cli_xxxxxxxxxx"
# app_secret should be set via LARK_APP_SECRET environment variable

# API/auth region: lark (default) or feishu
region: "lark"

# Default settings
defaults:
  timezone: "Asia/Singapore"
  reminder_minutes: 15

# OAuth settings
oauth:
  redirect_port: 9999

# Webhook settings for Feishu/Lark event subscriptions (optional)
webhook:
  # Local listen address for `lark webhook serve`
  listen_addr: "0.0.0.0:8080"
  # Callback path configured in the Feishu/Lark app console
  path: "/webhook/feishu"
  # Optional verification token configured in the Feishu/Lark app console
  verification_token: ""
  # JSONL file that stores received message events
  event_log: ".lark/webhook-events.jsonl"
  # Optional plain-text auto-reply template
  # Supported placeholders: {{text}}, {{chat_id}}, {{message_id}}, {{sender_open_id}}
  auto_reply_text: ""

# Custom emoji mappings (optional)
# Map custom emoji IDs to human-readable labels for reactions
# Find custom emoji IDs via: lark msg react emojis
# custom_emojis:
#   "7405453485858095136": "ez-pepe"
#   "7405453485858111520": "pepe-laugh"
